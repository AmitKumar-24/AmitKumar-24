name: Generate GitHub Stats
 
on:
  schedule:
    - cron: "0 */12 * * *"  # Updates every 12 hours
  workflow_dispatch:  # Allows manual trigger
  push:
    branches:
      - main
 
jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Create output directory
        run: mkdir -p stats
 
      - name: Generate GitHub Stats Card
        uses: lowlighter/metrics@latest
        with:
          filename: stats/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AmitKumar-24
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 0, 8 + 11%
 
      - name: Generate Top Languages Card
        uses: lowlighter/metrics@latest
        with:
          filename: stats/top-languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AmitKumar-24
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 0, 8 + 11%
 
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          git diff --staged --quiet || git commit -m "Update GitHub stats"
          git push
 
